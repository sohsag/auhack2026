<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SQL-AI Query Glue</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@300;400;500;600&family=Geist+Mono:wght@400;500&display=swap" rel="stylesheet"/>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Geist', 'sans-serif'],
                        mono: ['Geist Mono', 'monospace'],
                    },
                    colors: {
                        surface: '#0a0a0a',
                        panel: '#111111',
                        border: '#1f1f1f',
                        muted: '#2a2a2a',
                        accent: '#4fffb0',
                    },
                    keyframes: {
                        'fade-up': {
                            '0%': { opacity: '0', transform: 'translateY(8px)' },
                            '100%': { opacity: '1', transform: 'translateY(0)' },
                        },
                        'pulse-dot': {
                            '0%, 100%': { opacity: '1' },
                            '50%': { opacity: '0.3' },
                        },
                    },
                    animation: {
                        'fade-up': 'fade-up 0.4s ease forwards',
                        'pulse-dot': 'pulse-dot 2s ease-in-out infinite',
                    },
                }
            }
        }
    </script>
</head>
<body class="bg-surface text-white font-sans h-screen flex overflow-hidden antialiased">

    <!-- Sidebar -->
    <aside class="w-64 shrink-0 bg-panel border-r border-border flex flex-col">

        <!-- Logo -->
        <div class="px-5 py-5 flex items-center gap-3 border-b border-border">
            <div class="w-7 h-7 rounded-md bg-accent/10 border border-accent/20 flex items-center justify-center shrink-0">
                <svg class="w-3.5 h-3.5 text-accent" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 7v10c0 2.21 3.582 4 8 4s8-1.79 8-4V7M4 7c0 2.21 3.582 4 8 4s8-1.79 8-4M4 7c0-2.21 3.582-4 8-4s8 1.79 8 4"/>
                </svg>
            </div>
            <span class="text-sm font-semibold tracking-tight text-white">SQL-AI Glue</span>
        </div>

        <!-- Fields -->
        <div class="flex flex-col gap-1 p-3 border-b border-border">
            <p class="text-[10px] font-mono font-medium text-white/20 uppercase tracking-widest px-2 pt-1 pb-2">Configuration</p>

            <div class="flex flex-col gap-1">
                <label class="text-[11px] font-mono text-white/30 px-2">Provider</label>
                <select
                    id="provider"
                    class="bg-surface border border-border rounded-lg px-3 py-2 text-xs font-mono text-white/70 focus:outline-none focus:border-accent/40 transition-colors w-full"
                >
                    <option value="anthropic">Anthropic (Claude)</option>
                    <option value="openai">OpenAI (GPT-4o)</option>
                    <option value="gemini">Google (Gemini)</option>
                    <option value="groq">Groq (Kimi K2)</option>
                </select>
            </div>

            <div class="flex flex-col gap-1 mt-2">
                <label class="text-[11px] font-mono text-white/30 px-2">API Key</label>
                <input
                    type="password"
                    id="api-key"
                    placeholder="sk-ant-..."
                    class="bg-surface border border-border rounded-lg px-3 py-2 text-xs font-mono text-white/70 placeholder-white/15 focus:outline-none focus:border-accent/40 focus:bg-accent/[0.03] transition-colors w-full"
                />
            </div>

            <div class="flex flex-col gap-1 mt-2">
                <label class="text-[11px] font-mono text-white/30 px-2">MCP Server URL</label>
                <input
                    type="text"
                    id="mcp-url"
                    value="http://localhost:3000"
                    class="bg-surface border border-border rounded-lg px-3 py-2 text-xs font-mono text-white/70 placeholder-white/15 focus:outline-none focus:border-accent/40 focus:bg-accent/[0.03] transition-colors w-full"
                />
            </div>
        </div>

        <!-- Status -->
        <div class="p-3">
            <p class="text-[10px] font-mono font-medium text-white/20 uppercase tracking-widest px-2 pt-1 pb-2">Dataset Status</p>
            <div id="db-status" class="flex items-center gap-2.5 px-2">
                <span class="relative flex h-1.5 w-1.5">
                    <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-red-500 opacity-60"></span>
                    <span class="relative inline-flex rounded-full h-1.5 w-1.5 bg-red-500"></span>
                </span>
                <span class="text-xs font-mono text-white/30">Disconnected</span>
            </div>
        </div>

        <!-- Footer -->
        <div class="mt-auto px-5 py-4 border-t border-border">
            <p class="text-[10px] font-mono text-white/15 leading-relaxed">Keys stored locally in your browser</p>
        </div>
    </aside>

    <!-- Main -->
    <main class="flex-1 flex flex-col min-w-0">

        <!-- Top Bar -->
        <header class="h-12  flex items-center justify-between px-6 shrink-0">
            <span class="text-xs font-mono text-white/20">Front page</span>
            <div class="flex items-center gap-1.5">
                <span class="h-1.5 w-1.5 rounded-full bg-accent animate-pulse-dot"></span>
                <span class="text-[10px] font-mono text-white/20">Ready</span>
            </div>
        </header>

        <!-- Chat -->
        <div id="chat-window" class="flex-1 overflow-y-auto px-6 py-8 flex flex-col gap-5 scroll-smooth" style="scrollbar-width: thin; scrollbar-color: #1f1f1f transparent;">

            <!-- Welcome message -->
            <div class="max-w-xl animate-fade-up">
                <div class="flex items-start gap-3">
                    <div class="w-6 h-6 rounded-md bg-accent/10 border border-accent/20 flex items-center justify-center shrink-0 mt-0.5">
                        <svg class="w-3 h-3 text-accent" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 7v10c0 2.21 3.582 4 8 4s8-1.79 8-4V7M4 7c0 2.21 3.582 4 8 4s8-1.79 8-4M4 7c0-2.21 3.582-4 8-4s8 1.79 8 4"/>
                        </svg>
                    </div>
                    <div class="bg-panel border border-border rounded-xl rounded-tl-sm px-4 py-3 text-sm text-white/60 leading-relaxed">
                        Hello. I'm your SQL-enabled assistant. Configure your API key and start querying your data.
                    </div>
                </div>
            </div>

        </div>

        <!-- Input -->
        <div class="px-6 py-5 border-t border-border shrink-0">
            <form id="input-area" class="max-w-3xl mx-auto">
                <div class="flex items-center gap-2 bg-panel border border-border rounded-xl px-4 py-2.5 focus-within:border-white/10 transition-colors">
                    <input
                        type="text"
                        id="user-input"
                        placeholder="Ask about your data..."
                        autocomplete="off"
                        class="flex-1 bg-transparent text-sm text-white/80 placeholder-white/15 focus:outline-none font-sans"
                    />
                    <button
                        type="submit"
                        class="shrink-0 bg-accent text-black text-xs font-semibold px-4 py-1.5 rounded-lg hover:bg-accent/90 active:scale-95 transition-all"
                    >
                        Send
                    </button>
                </div>
                <p class="text-center text-[11px] font-mono text-white/15 mt-3">
                    e.g. "What was the avg temperature in Germany in 2024?"
                </p>
            </form>
        </div>

    </main>

    <script src="app.js"></script>
</body>
</html>
